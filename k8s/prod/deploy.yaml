apiVersion: apps/v1
kind: Deployment
metadata:
  name: sd-copilot-deployment
  namespace: sd-copilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sd-copilot
  template:
    metadata:
      labels:
        app: sd-copilot
    spec:
      terminationGracePeriodSeconds: 40
      containers:
        - name: sd-copilot
          image: sd-copilot:placeholder   # still using Option A, we override via kubectl set image
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: sd-copilot-secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 120
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 120