<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Radial gradient matching your CSS -->
    <radialGradient id="g" cx="20%" cy="20%" r="80%">
      <stop offset="0%" stop-color="rgb(239, 246, 255)" />
      <stop offset="50%" stop-color="rgb(29, 78, 216)" />
      <stop offset="100%" stop-color="rgb(15, 23, 42)" />
    </radialGradient>

    <!-- Subtle shadow (scaled-down version of box-shadow) -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="6"
        stdDeviation="8"
        flood-color="rgb(37, 99, 235)"
        flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect
    x="5"
    y="5"
    width="90"
    height="90"
    rx="32"
    ry="32"
    fill="url(#g)"
    filter="url(#shadow)" />

  <!-- Center letter (adjust if needed) -->
  <text
    x="50"
    y="63"
    text-anchor="middle"
    font-size="48"
    font-weight="700"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif"
    fill="white">
    IC
  </text>
</svg>