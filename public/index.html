<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive Coach</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <sd-header id="header" active="home"></sd-header>

  <div id="component-container">
    <sd-home></sd-home>
  </div>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2025 Interactive Coach.</p>
    </div>
  </footer>
  <script src="components/header/header.component.js" defer></script>
  <script src="components/home/home.component.js" defer></script>
  <script src="components/system-design/system-design.component.js" defer></script>
  <script src="components/resume-assistant/resume-assistant.component.js" defer></script>
  <script src="components/interview-chat-assistant/interview-chat-assistant.component.js" defer></script>

  <script>
    document.addEventListener('sd-coach-create', function (event) {
      const sdCoachComponent = document.createElement('sd-coach');
      const parentComp = document.getElementById('component-container');
      parentComp.innerHTML = '';
      parentComp.appendChild(sdCoachComponent);
      document.getElementById('header').resetActiveLinkSelection('sd-tutor');
    });
    document.addEventListener('sd-resume-create', function (event) {
      const sdCoachComponent = document.createElement('sd-resume-assistant');
      const parentComp = document.getElementById('component-container');
      parentComp.innerHTML = '';
      parentComp.appendChild(sdCoachComponent);
      document.getElementById('header').resetActiveLinkSelection('resume-assistant');
    });
    document.addEventListener('sd-home-create', function (event) {
      const sdCoachComponent = document.createElement('sd-home');
      const parentComp = document.getElementById('component-container');
      parentComp.innerHTML = '';
      parentComp.appendChild(sdCoachComponent);
      document.getElementById('header').resetActiveLinkSelection('home');
    });
    document.addEventListener('interview-chat-assistant-create', function (event) {
      const sdCoachComponent = document.createElement('interview-chat-assistant');
      const parentComp = document.getElementById('component-container');
      parentComp.innerHTML = '';
      parentComp.appendChild(sdCoachComponent);
      document.getElementById('header').resetActiveLinkSelection('interview-chat-assistant');
    });
  </script>
</body>

</html>
